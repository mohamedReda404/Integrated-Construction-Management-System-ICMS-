<div class="min-h-screen bg-slate-100 relative overflow-hidden">

  <!-- Gradient Background Layer -->
  <div class="absolute inset-0 
              bg-gradient-to-br 
              from-white 
              via-slate-50 
              to-[#155DFC]/10">
  </div>

  <!-- Content -->
  <div class="relative w-full px-6 md:px-10 xl:px-16 
              flex items-center justify-center 
              min-h-screen text-center">

    <div class="max-w-3xl">

      <!-- Icon -->
      <div class="w-28 h-28 mx-auto mb-10 
                  rounded-full 
                  bg-gradient-to-br 
                  from-[#155DFC]/20 
                  to-[#155DFC]/5
                  flex items-center justify-center
                  border border-slate-200 shadow-sm">

        <i class="fa-solid fa-helmet-safety 
                  text-[#155DFC] text-5xl"></i>
      </div>

      <!-- 404 -->
      <h1 class="text-[110px] md:text-[140px] font-extrabold 
                 bg-gradient-to-r 
                 from-[#155DFC] 
                 to-blue-400
                 bg-clip-text text-transparent 
                 tracking-tight leading-none">
        404
      </h1>

      <!-- Title -->
      <h2 class="text-3xl md:text-4xl font-semibold 
                 text-slate-800 mt-6">
        Page Not Found
      </h2>

      <!-- Description -->
      <p class="text-slate-600 mt-6 text-lg leading-relaxed">
        The requested page does not exist within the current 
        Integrated Construction Management System environment.
      </p>

      <!-- Accent Line -->
      <div class="w-32 h-1 
                  bg-gradient-to-r 
                  from-[#155DFC] 
                  to-blue-400
                  mx-auto rounded-full mt-10">
      </div>

      <!-- Buttons -->
      <div class="mt-14 flex flex-col sm:flex-row 
                  justify-center gap-6">

        <a routerLink="/home"
           class="bg-gradient-to-r 
                  from-[#155DFC] 
                  to-blue-500
                  hover:from-[#104bbf] 
                  hover:to-blue-600
                  text-white px-10 py-3 
                  rounded-xl 
                  shadow-lg hover:shadow-xl 
                  transition font-medium">
          Return to Dashboard
        </a>

        <button (click)="goBack()"
                class="border border-slate-300 
                       text-slate-700 px-10 py-3 
                       rounded-xl 
                       hover:bg-slate-100 
                       transition font-medium">
          Go Back
        </button>

      </div>

    </div>

  </div>

</div>
