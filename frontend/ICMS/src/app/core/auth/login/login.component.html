<section class="min-h-screen flex items-center justify-center bg-gradient-to-br from-slate-50 to-blue-50 px-4 sm:px-6 lg:px-8">

  <div class="w-full max-w-xl bg-white rounded-2xl shadow-xl border border-gray-100 p-6 sm:p-10 lg:p-12">

    <!-- Header -->
    <div class="text-center space-y-3 mb-8">

      <h2 class="text-3xl sm:text-4xl font-bold text-slate-800">
        Welcome Back
      </h2>

      <p class="text-slate-500 text-base sm:text-lg">
        Login to access your construction management system
      </p>

    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="space-y-6">

      <!-- User Type -->
      <div class="flex gap-3">

        <button
          type="button"
          (click)="setUserType('admin')"
          [class.bg-[#155DFC]]="userType === 'admin'"
          [class.text-white]="userType === 'admin'"
          class="flex-1 py-2.5 rounded-xl border border-gray-300 text-sm sm:text-base font-semibold transition">

          Admin

        </button>

        <button
          type="button"
          (click)="setUserType('member')"
          [class.bg-[#155DFC]]="userType === 'member'"
          [class.text-white]="userType === 'member'"
          class="flex-1 py-2.5 rounded-xl border border-gray-300 text-sm sm:text-base font-semibold transition">

          Member

        </button>

      </div>

      <!-- Email -->
      <div>

        <label class="text-sm sm:text-base font-semibold text-slate-700">
          Email Address
        </label>

        <input
          formControlName="email"
          type="email"
          placeholder="Enter your email"
          class="mt-2 w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm sm:text-base
                 focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

      </div>

      <!-- ADMIN -->
      <div *ngIf="userType === 'admin'" class="space-y-4">

        <label class="text-sm sm:text-base font-semibold text-slate-700">
          Password
        </label>

        <div class="relative">

          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            class="w-full px-4 py-3 pr-12 rounded-xl border border-gray-200 bg-gray-50 text-sm sm:text-base
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400">

            <i class="fa-solid"
               [class.fa-eye]="!showPassword"
               [class.fa-eye-slash]="showPassword"></i>

          </button>

        </div>

      </div>

      <!-- MEMBER -->
      <div *ngIf="userType === 'member'" class="space-y-4">

        <div>

          <label class="text-sm sm:text-base font-semibold text-slate-700">
            Permission Number
          </label>

          <input
            formControlName="permissionNumber"
            type="text"
            placeholder="EMP@1028"
            class="mt-2 w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm sm:text-base
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

        </div>

        <div>

          <label class="text-sm sm:text-base font-semibold text-slate-700">
            Section
          </label>

          <select
            formControlName="section"
            class="mt-2 w-full px-4 py-3 rounded-xl border border-gray-200 bg-gray-50 text-sm sm:text-base
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

            <option value="">Select Section</option>
            <option>Electric</option>
            <option>Civil</option>
            <option>Mechanical</option>
            <option>Architectural</option>

          </select>

        </div>

      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-3.5 rounded-xl text-base font-semibold transition
               bg-[#155DFC] hover:bg-[#104bbf] text-white shadow-md
               disabled:opacity-50">

        <span *ngIf="!isLoading">Sign In</span>
        <span *ngIf="isLoading">Loading...</span>

      </button>

      <!-- Error -->
      <div
        *ngIf="msgError"
        class="text-sm rounded-lg border border-red-300 bg-red-50 px-3 py-2 text-red-700 text-center">

        {{ msgError }}

      </div>

      <!-- Register -->
      <p class="text-center text-sm text-slate-600 mt-4">

        Don’t have an account?

        <a routerLink="/register" class="text-[#155DFC] font-semibold hover:underline">
          Create Account
        </a>

      </p>

    </form>

  </div>

</section>
