<section class="min-h-screen flex items-center justify-center bg-linear-to-br from-slate-50 to-blue-50 px-6">

  <div class="w-full max-w-2xl bg-white rounded-3xl shadow-2xl border border-gray-100 p-14">

    <!-- Header -->
    <div class="text-center space-y-4 mb-10">
      <h2 class="text-5xl font-bold text-slate-800">
        Welcome Back
      </h2>

      <p class="text-slate-500 text-xl">
        Login to access your construction management system
      </p>
    </div>

    <!-- Form -->
    <form [formGroup]="loginForm" (ngSubmit)="submitForm()" class="space-y-8">

      <!-- User Type -->
      <div class="flex gap-4 mb-6">

        <button
          type="button"
          (click)="setUserType('admin')"
          [class.bg-[#155DFC]]="userType === 'admin'"
          [class.text-white]="userType === 'admin'"
          [class.scale-105]="userType === 'admin'"
          class="flex-1 py-3 rounded-xl border border-gray-300 text-lg font-semibold transition-all duration-200">

          Admin

        </button>

        <button
          type="button"
          (click)="setUserType('member')"
          [class.bg-[#155DFC]]="userType === 'member'"
          [class.text-white]="userType === 'member'"
          [class.scale-105]="userType === 'member'"
          class="flex-1 py-3 rounded-xl border border-gray-300 text-lg font-semibold transition-all duration-200">

          Member

        </button>

      </div>

      <!-- Email -->
      <div>

        <label class="text-lg font-semibold text-slate-700">
          Email Address
        </label>

        <input
          formControlName="email"
          type="email"
          placeholder="Enter your email"
          class="mt-3 w-full px-6 py-4 rounded-2xl border border-gray-200 bg-gray-50 text-lg
                 focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

      </div>

      <!-- ADMIN LOGIN -->
      <div *ngIf="userType === 'admin'" @fadeSlide>

        <label class="text-lg font-semibold text-slate-700">
          Password
        </label>

        <div class="relative mt-3">

          <input
            formControlName="password"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="Enter your password"
            class="w-full px-6 py-4 pr-14 rounded-2xl border border-gray-200 bg-gray-50 text-lg
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

          <button
            type="button"
            (click)="showPassword = !showPassword"
            class="absolute right-5 top-1/2 -translate-y-1/2 text-slate-400 hover:text-[#155DFC] transition">

            <i
              class="fa-solid"
              [class.fa-eye]="!showPassword"
              [class.fa-eye-slash]="showPassword">
            </i>

          </button>

        </div>

      </div>

      <!-- MEMBER LOGIN -->
      <div *ngIf="userType === 'member'" @fadeSlide class="space-y-8">

        <!-- Permission Number -->
        <div>

          <label class="text-lg font-semibold text-slate-700">
            Permission Number
          </label>

          <input
            formControlName="permissionNumber"
            type="text"
            placeholder="EMP@1028"
            class="mt-3 w-full px-6 py-4 rounded-2xl border border-gray-200 bg-gray-50 text-lg
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

        </div>

        <!-- Section -->
        <div>

          <label class="text-lg font-semibold text-slate-700">
            Section
          </label>

          <select
            formControlName="section"
            class="mt-3 w-full px-6 py-4 rounded-2xl border border-gray-200 bg-gray-50 text-lg
                   focus:outline-none focus:ring-2 focus:ring-[#155DFC]">

            <option value="">Select Section</option>
            <option value="Electric">Electric</option>
            <option value="Civil">Civil</option>
            <option value="Mechanical">Mechanical</option>
            <option value="Architectural">Architectural</option>

          </select>

        </div>

      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="isLoading"
        class="w-full py-5 text-xl font-semibold rounded-2xl transition
               bg-[#155DFC] hover:bg-[#104bbf] text-white shadow-md hover:shadow-xl
               disabled:bg-gray-300 disabled:cursor-not-allowed">

        <span *ngIf="!isLoading">
          Sign In
        </span>

        <span *ngIf="isLoading">
          Loading...
        </span>

      </button>

      <!-- Error -->
      <div
        *ngIf="msgError"
        class="rounded-xl border border-red-300 bg-red-50 px-4 py-3 text-red-700 text-center">

        {{ msgError }}

      </div>

      <!-- Register -->
      <p class="text-center text-lg text-slate-600 mt-6">

        Don’t have an account?

        <a
          routerLink="/register"
          class="text-[#155DFC] font-semibold hover:underline">

          Create Account

        </a>

      </p>

    </form>

  </div>

</section>
